name: Build OpenWrt – ZTE E8820S

on:
  push:
    branches: [ main ]
    paths:
      - 'patch/**'
      - 'config/.config'
      - 'scripts/**'
      - '.github/workflows/build-openwrt-zte-e8820s.yml'
  workflow_dispatch:
    inputs:
      openwrt_tag:
        description: 'OpenWrt tag/branch (e.g. v25.12.0 or openwrt-25.12)'
        required: true
        default: 'v25.12.0'
      upload_release:
        description: 'Create GitHub Release'
        required: true
        default: 'true'
        type: boolean
      clean_build:
        description: 'Clean build (ignore cache)'
        required: true
        default: 'false'
        type: boolean

env:
  OPENWRT_REPO:   https://github.com/openwrt/openwrt.git
  OPENWRT_TAG:    ${{ github.event.inputs.openwrt_tag || 'v25.12.0' }}
  TARGET:         ramips
  SUBTARGET:      mt7621
  DEVICE_PROFILE: zte_e8820s
  TZ:             Asia/Jakarta

jobs:
  build:
    name: Compile ZTE E8820S – OpenWrt ${{ github.event.inputs.openwrt_tag || 'v25.12.0' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      # ── 1. Checkout private repo (purbo/ZTE-E8820S) ─────────────────
      - name: Checkout ZTE-E8820S repo
        uses: actions/checkout@v4
        with:
          path: zte-repo

      # ── 2. Free disk space (~20 GB freed) ────────────────────────────
      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY"
          sudo apt-get autoremove -yq --purge
          df -hT

      # ── 3. Set timezone & install build dependencies ──────────────────
      - name: Install OpenWrt build dependencies
        run: |
          sudo timedatectl set-timezone "$TZ"
          sudo apt-get update -qq
          sudo apt-get install -yq \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl \
            device-tree-compiler ecj fastjar file flex gawk gettext \
            gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man \
            intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
            libncursesw5 libncursesw5-dev libreadline-dev libssl-dev libtool \
            lld llvm lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch \
            pkgconf python3 python3-pip python3-pyelftools qemu-utils re2c \
            rsync scons squashfs-tools subversion swig texinfo uglifyjs \
            upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      # ── 4. Clone OpenWrt source ───────────────────────────────────────
      - name: Clone OpenWrt ${{ env.OPENWRT_TAG }}
        run: |
          git clone --depth=1 --branch "$OPENWRT_TAG" "$OPENWRT_REPO" openwrt
          echo "OPENWRT_HASH=$(git -C openwrt rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date +%Y%m%d-%H%M)" >> "$GITHUB_ENV"

      # ── 5. Apply patches from zte-repo/patch/ ────────────────────────
      #
      #  Structure expected in purbo/ZTE-E8820S:
      #  ├── patch/
      #  │   ├── mt7621_zte_e8820s.dts   → DTS file for the device
      #  │   ├── leds.txt                → LED entries injected into 01_leds
      #  │   ├── zte.txt                 → Device image entry for mt7621.mk
      #  │   └── 99-default-settings     → UCI defaults (wifi SSID & password)
      #  ├── config/.config              → OpenWrt build config (from make menuconfig)
      #  └── scripts/
      #      ├── customize-feeds.sh      → runs before feeds update  (optional)
      #      └── customize-packages.sh  → runs after  feeds install (optional)
      #
      - name: Apply patches
        working-directory: ${{ github.workspace }}
        run: |
          PATCH="zte-repo/patch"
          OW="openwrt"

          echo "════════════════════════════════════════"
          echo "  Applying ZTE E8820S patches"
          echo "════════════════════════════════════════"

          # ── [1/4] DTS file ──────────────────────────────────────────
          echo "[1/4] Copying DTS file …"
          cp -v "$PATCH/mt7621_zte_e8820s.dts" \
            "$OW/target/linux/ramips/dts/"

          # ── [2/4] LED entries ────────────────────────────────────────
          # Injects leds.txt content just before the closing `esac` line
          # in 01_leds, which is the standard insertion point for new boards.
          echo "[2/4] Patching LED board detection …"
          LED_SCRIPT="$OW/target/linux/ramips/mt7621/base-files/etc/board.d/01_leds"
          if grep -q "^esac" "$LED_SCRIPT"; then
            sed -i \
              -e '/^esac/i \\' \
              -e "/^esac/r $PATCH/leds.txt" \
              "$LED_SCRIPT"
            echo "      → injected leds.txt before 'esac'"
          else
            echo "      ⚠ 'esac' not found in 01_leds — skipping LED patch"
            echo "        (file may have changed in this OpenWrt version)"
          fi

          # ── [3/4] Make configuration (image definition) ───────────────
          echo "[3/4] Appending device image config to mt7621.mk …"
          MK_FILE="$OW/target/linux/ramips/image/mt7621.mk"
          cat "$PATCH/zte.txt" >> "$MK_FILE"
          echo "      → appended zte.txt to mt7621.mk"

          # ── [4/4] Default WiFi SSID & password (UCI defaults) ─────────
          echo "[4/4] Copying UCI default settings …"
          cp -v "$PATCH/99-default-settings" \
            "$OW/package/base-files/files/etc/uci-defaults/"

          echo "════════════════════════════════════════"
          echo "  All patches applied successfully ✓"
          echo "════════════════════════════════════════"

      # ── 6. Customize feeds (optional script) ─────────────────────────
      - name: Customize feeds
        run: |
          SCRIPT="$GITHUB_WORKSPACE/zte-repo/scripts/customize-feeds.sh"
          if [ -f "$SCRIPT" ]; then
            echo "Running customize-feeds.sh …"
            chmod +x "$SCRIPT"
            cd openwrt && bash "$SCRIPT"
          else
            echo "No customize-feeds.sh found, skipping."
          fi

      # ── 7. Update & install feeds ────────────────────────────────────
      - name: Update & install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ── 8. Customize packages (optional script) ──────────────────────
      - name: Customize packages
        run: |
          SCRIPT="$GITHUB_WORKSPACE/zte-repo/scripts/customize-packages.sh"
          if [ -f "$SCRIPT" ]; then
            echo "Running customize-packages.sh …"
            chmod +x "$SCRIPT"
            cd openwrt && bash "$SCRIPT"
          else
            echo "No customize-packages.sh found, skipping."
          fi

      # ── 9. Load build config from patch/config8820s ──────────────────
      #  Uses the curated .config from purbo/ZTE-E8820S (already checked
      #  out at zte-repo/) — no download needed.
      - name: Load build config
        working-directory: openwrt
        run: |
          CONFIG_SRC="$GITHUB_WORKSPACE/zte-repo/patch/config8820s"
 
          echo "Loading config from: zte-repo/patch/config8820s"
          cp -v "$CONFIG_SRC" .config
 
          echo "── Effective TARGET config ──────────────────"
          grep "^CONFIG_TARGET" .config
          echo "─────────────────────────────────────────────"
 
          # Expand all derived Kconfig symbols
          make defconfig
          
      # ── 10. Cache downloaded sources ─────────────────────────────────
      - name: Cache dl/
        uses: actions/cache@v4
        if: github.event.inputs.clean_build != 'true'
        with:
          path: openwrt/dl
          key: openwrt-dl-${{ env.OPENWRT_TAG }}-${{ hashFiles('openwrt/.config') }}
          restore-keys: |
            openwrt-dl-${{ env.OPENWRT_TAG }}-
            openwrt-dl-

      # ── 11. Download package sources ─────────────────────────────────
      - name: Download package sources
        working-directory: openwrt
        run: |
          make download -j$(nproc) 2>&1 | tee /tmp/dl.log
          # Retry single-threaded on any error
          if grep -qi "error" /tmp/dl.log; then
            echo "Retrying failed downloads …"
            make download -j1 V=s
          fi
          # Remove incomplete files < 1 KB
          find dl -size -1024c -delete

      # ── 12. Compile ───────────────────────────────────────────────────
      - name: Compile firmware
        id: compile
        working-directory: openwrt
        run: |
          echo "Compiling with $(nproc) threads …"
          make -j$(nproc) IGNORE_ERRORS=m || {
            echo "Multi-thread build failed, retrying single-thread (verbose) …"
            make -j1 V=s IGNORE_ERRORS=m
          }
          echo "status=success" >> "$GITHUB_OUTPUT"

      # ── 13. Collect output files ──────────────────────────────────────
      - name: Collect firmware files
        if: steps.compile.outputs.status == 'success'
        run: |
          OUTPUT_DIR="$GITHUB_WORKSPACE/firmware"
          mkdir -p "$OUTPUT_DIR"
          IMGDIR="openwrt/bin/targets/$TARGET/$SUBTARGET"

          # Copy all useful output files
          find "$IMGDIR" \( \
            -name "*.bin" -o \
            -name "*.img" -o \
            -name "*.img.gz" -o \
            -name "*.manifest" -o \
            -name "*.buildinfo" -o \
            -name "sha256sums" \
          \) -exec cp {} "$OUTPUT_DIR/" \;

          echo "── Firmware files ──────────────────────"
          ls -lh "$OUTPUT_DIR/"
          echo "────────────────────────────────────────"
          echo "firmware_path=$OUTPUT_DIR" >> "$GITHUB_ENV"

      # ── 14. Upload as Actions Artifact (always available) ────────────
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: OpenWrt_ZTE-E8820S_${{ env.BUILD_DATE }}
          path: firmware/
          retention-days: 30

      # ── 15. Create GitHub Release ────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: >
          steps.compile.outputs.status == 'success' &&
          (github.event.inputs.upload_release == 'true' || github.event_name == 'push')
        with:
          tag_name: "openwrt-${{ env.OPENWRT_TAG }}-${{ env.BUILD_DATE }}"
          name: "ZTE E8820S │ OpenWrt ${{ env.OPENWRT_TAG }} │ ${{ env.BUILD_DATE }}"
          body: |
            ## ZTE E8820S – OpenWrt Custom Firmware

            | Field        | Value |
            |---|---|
            | OpenWrt      | `${{ env.OPENWRT_TAG }}` (`${{ env.OPENWRT_HASH }}`) |
            | Target       | `ramips/mt7621` |
            | Device       | `zte_e8820s` |
            | Built on     | `${{ env.BUILD_DATE }}` (WIB) |
            | Source repo  | `purbo/ZTE-E8820S` @ `${{ github.sha }}` |

            ### Flash via BREED

            1. Sambung PC ke router via LAN
            2. Tekan tombol reset, nyalakan router → tahan sampai LED berkedip
            3. Buka `http://192.168.1.1` di browser (BREED web UI)
            4. **Firmware Update** → pilih `*-squashfs-factory.bin`
            5. Flash & tunggu reboot
            6. Login: `http://192.168.1.1` · user `root` · tanpa password

            ### File yang disertakan
            | File | Kegunaan |
            |---|---|
            | `*-squashfs-factory.bin` | Flash dari stock firmware / BREED |
            | `*-squashfs-sysupgrade.bin` | Upgrade dari OpenWrt yang sudah ada |
            | `*.manifest` | Daftar package yang terinstall |
            | `*.buildinfo` | Info build reproducibility |

            ---
            > 🔧 Dicompile dari [purbo/ZTE-E8820S](https://github.com/purbo/ZTE-E8820S) dengan modifikasi source langsung.
          files: firmware/*
          draft: false
          prerelease: false
