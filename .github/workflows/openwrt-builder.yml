name: Build OpenWrt for ZTE E8820S

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt release version (e.g. 25.12.0)"
        required: true
        default: "25.12.0"

env:
  OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version || '25.12.0' }}
  REPO_URL: https://github.com/openwrt/openwrt
  TARGET: ramips
  SUBTARGET: mt7621
  TZ: Asia/Jakarta

jobs:
  build:
    name: Compile ZTE E8820S Firmware
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      # ── Checkout patch repo ──────────────────────────────────────────────
      - name: Checkout ZTE-E8820S patch repository
        uses: actions/checkout@v4
        with:
          repository: srt19/ZTE-E8820S
          path: ZTE-E8820S

      # ── System preparation ───────────────────────────────────────────────
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune -af 2>/dev/null || true
          df -h

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev \
            libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget qemu-utils

      # ── Clone OpenWrt source ─────────────────────────────────────────────
      - name: Clone OpenWrt ${{ env.OPENWRT_VERSION }} source
        run: |
          git clone --depth 1 \
            --branch v${{ env.OPENWRT_VERSION }} \
            ${{ env.REPO_URL }} openwrt

      # ── Apply srt19 patches ──────────────────────────────────────────────
      - name: Apply DTS patch
        run: |
          cp ZTE-E8820S/patch/mt7621_zte_e8820s.dts \
             openwrt/target/linux/ramips/dts/

      - name: Apply LED patch
        run: |
          sed -i -e '/^esac/i \\' \
                 -e '/^esac/r ZTE-E8820S/patch/leds.txt' \
             openwrt/target/linux/ramips/mt7621/base-files/etc/board.d/01_leds

      - name: Apply image Makefile patch
        run: |
          cat ZTE-E8820S/patch/zte.txt \
            >> openwrt/target/linux/ramips/image/mt7621.mk

      - name: Apply default Wi-Fi settings
        run: |
          cp ZTE-E8820S/patch/99-default-settings \
             openwrt/package/base-files/files/etc/uci-defaults/

      # ── Feeds ────────────────────────────────────────────────────────────
      - name: Update and install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ── Build config ─────────────────────────────────────────────────────
      - name: Download official buildinfo config
        working-directory: openwrt
        run: |
          wget -qO .config \
            https://downloads.openwrt.org/releases/${{ env.OPENWRT_VERSION }}/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/config.buildinfo

      - name: Append E8820S device selection and run defconfig
        working-directory: openwrt
        run: |
          printf '\nCONFIG_TARGET_ramips=y\nCONFIG_TARGET_ramips_mt7621=y\nCONFIG_TARGET_ramips_mt7621_DEVICE_zte_e8820s=y\n' >> .config
          make defconfig

      # ── Download sources ─────────────────────────────────────────────────
      - name: Download package sources
        working-directory: openwrt
        run: |
          make download -j$(nproc) V=s 2>&1 | tee /tmp/download.log
          grep -i "^ERROR" /tmp/download.log || true

      # ── Compile ──────────────────────────────────────────────────────────
      - name: Compile firmware (multi-core)
        id: compile
        working-directory: openwrt
        run: |
          echo "Compiling with $(nproc) threads..."
          make -j$(nproc) V=s 2>&1 | tee /tmp/build.log
          echo "COMPILE_OK=true" >> $GITHUB_ENV

      - name: Retry with single thread on failure
        if: env.COMPILE_OK != 'true'
        working-directory: openwrt
        run: |
          echo "Retrying with -j1 for detailed error output..."
          make -j1 V=s 2>&1 | tee /tmp/build-j1.log

      # ── Gather artifacts ─────────────────────────────────────────────────
      - name: Collect firmware files
        run: |
          FIRMWARE_DIR=openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}
          OUTPUT_DIR=$GITHUB_WORKSPACE/firmware_output
          mkdir -p "$OUTPUT_DIR"

          find "$FIRMWARE_DIR" -name "*zte_e8820s*" \
            \( -name "*.bin" -o -name "*.gz" \) \
            -exec cp {} "$OUTPUT_DIR/" \;

          cp "$FIRMWARE_DIR/config.buildinfo" "$OUTPUT_DIR/" 2>/dev/null || true
          cp "$FIRMWARE_DIR/sha256sums"       "$OUTPUT_DIR/" 2>/dev/null || true

          echo "--- Collected files ---"
          ls -lh "$OUTPUT_DIR/"

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.OPENWRT_VERSION }}-${{ github.run_number }}
          name: "ZTE E8820S OpenWrt v${{ env.OPENWRT_VERSION }} (build ${{ github.run_number }})"
          body: |
            ## ZTE E8820S — OpenWrt v${{ env.OPENWRT_VERSION }}

            Built from official OpenWrt source with [srt19/ZTE-E8820S](https://github.com/srt19/ZTE-E8820S) patches.

            ### Installation (BREED required)
            1. Power on router then hold Reset for 5 seconds
            2. Connect PC to LAN port 1 and open http://192.168.1.1
            3. Flash *-squashfs-factory.bin using HC5962 layout

            ### Default credentials
            | Field | Value |
            |---|---|
            | URL | 192.168.1.1 |
            | User | root |
            | Password | (none) |
            | Wi-Fi SSID | OpenWrt |
            | Wi-Fi Password | 12345678 |
          files: firmware_output/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload artifact as fallback ───────────────────────────────────────
      - name: Upload firmware as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-zte-e8820s-v${{ env.OPENWRT_VERSION }}
          path: firmware_output/
          retention-days: 7

      # ── Upload build logs on failure ──────────────────────────────────────
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-failure
          path: |
            /tmp/build.log
            /tmp/build-j1.log
            /tmp/download.log
          retention-days: 3
